<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Register – SV PG for Gents</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="/css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="sv-navbar navbar navbar-expand-lg"><div class="container">
  <a class="navbar-brand" href="/index.html"><i class="bi bi-house-heart-fill me-2"></i>SV pg For Gents <span class="brand-dot"></span></a>
  <ul class="navbar-nav ms-auto" id="nav-user-area"></ul>
</div></nav>

<div class="container">
  <div class="sv-form-card">
    <h2>Create your account</h2>
    <p class="text-muted mb-4">Sign up in 30 seconds to start booking</p>
    <form id="reg-form" data-testid="register-form">
      <div class="mb-3"><label class="form-label">Full Name</label>
        <input class="form-control" id="name" required data-testid="register-name-input"/></div>
      <div class="mb-3"><label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required data-testid="register-email-input"/></div>
      <div class="mb-3"><label class="form-label">Phone</label>
        <input class="form-control" id="phone" data-testid="register-phone-input"/></div>
      <div class="mb-3"><label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required minlength="6" data-testid="register-password-input"/></div>
      <div id="err" class="alert alert-danger d-none" data-testid="register-error"></div>
      <button class="btn btn-sv-primary w-100" type="submit" data-testid="register-submit-btn">Create Account</button>
    </form>
    <p class="text-center mt-4 small">Already registered? <a href="/login.html">Login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.classList.add('d-none');
  try {
    const res = await apiFetch('/api/auth/register', { method: 'POST', body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      password: document.getElementById('password').value })});
    setToken(res.token); setUser(res.user);
    toast('Account created!', 'success');
    setTimeout(() => location.href = '/rules.html', 400);
  } catch (e) { err.textContent = e.message; err.classList.remove('d-none'); }
});
</script>
</body></html>
