<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PG Rules – Sri Vengamamba PG</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="/css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="sv-navbar navbar navbar-expand-lg"><div class="container">
  <a class="navbar-brand" href="/index.html"><i class="bi bi-house-heart-fill me-2"></i>Sri Vengamamba <span class="brand-dot">PG</span></a>
  <ul class="navbar-nav ms-auto" id="nav-user-area"></ul>
</div></nav>

<div class="container py-4">
  <div class="row justify-content-center"><div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="fw-bold"><i class="bi bi-clipboard-check-fill text-primary me-2"></i>PG House Rules</h2>
        <p class="text-muted">Please read & accept these rules before booking. They keep our community safe and comfortable for everyone.</p>
        <ol id="rules-list" class="lh-lg mt-3" data-testid="rules-list"></ol>

        <div class="form-check mt-4 mb-3">
          <input class="form-check-input" type="checkbox" id="agree" data-testid="rules-agree-checkbox"/>
          <label class="form-check-label fw-semibold" for="agree">
            I have read, understood and agree to abide by all the PG rules above.
          </label>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button id="accept-btn" class="btn btn-sv-primary" disabled data-testid="rules-accept-btn">
            <i class="bi bi-check-circle me-1"></i>Accept &amp; Continue to Rooms
          </button>
          <a href="/index.html" class="btn btn-outline-secondary">Back to Home</a>
        </div>
      </div>
    </div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
const user = requireAuth();
(async function() {
  try {
    const cfg = await apiFetch('/api/pg/config');
    document.getElementById('rules-list').innerHTML =
      cfg.rules.map(r => `<li>${escapeHTML(r)}</li>`).join('');
  } catch (e) { toast(e.message, 'error'); }
})();
const cb = document.getElementById('agree');
const btn = document.getElementById('accept-btn');
cb.addEventListener('change', () => btn.disabled = !cb.checked);
btn.addEventListener('click', async () => {
  try {
    await apiFetch('/api/auth/accept-rules', { method: 'POST' });
    const u = getUser(); u.rules_accepted = true; setUser(u);
    toast('Rules accepted', 'success');
    setTimeout(() => location.href = '/rooms.html', 400);
  } catch (e) { toast(e.message, 'error'); }
});
</script>
</body></html>
