<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login – SV PG for Gents</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="/css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="sv-navbar navbar navbar-expand-lg"><div class="container">
  <a class="navbar-brand" href="/index.html"><i class="bi bi-house-heart-fill me-2"></i>SV pg For Gents <span class="brand-dot"></span></a>
  <ul class="navbar-nav ms-auto" id="nav-user-area"></ul>
</div></nav>

<div class="container">
  <div class="sv-form-card">
    <h2>Welcome back</h2>
    <p class="text-muted mb-4">Login to book your bed</p>
    <form id="login-form" data-testid="login-form">
      <div class="mb-3"><label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required data-testid="login-email-input"/></div>
      <div class="mb-3"><label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required minlength="6" data-testid="login-password-input"/></div>
      <div id="err" class="alert alert-danger d-none" data-testid="login-error"></div>
      <button class="btn btn-sv-primary w-100" type="submit" data-testid="login-submit-btn">Login</button>
    </form>
    <p class="text-center mt-4 small">New here? <a href="/register.html" data-testid="login-to-register-link">Create account</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.classList.add('d-none');
  try {
    const res = await apiFetch('/api/auth/login', { method: 'POST', body: JSON.stringify({
      email: document.getElementById('email').value, password: document.getElementById('password').value })});
    setToken(res.token); setUser(res.user);
    toast('Welcome back!', 'success');
    const next = qs('next');
    setTimeout(() => location.href = next || (res.user.role === 'admin' ? '/admin.html' : '/rooms.html'), 400);
  } catch (e) { err.textContent = e.message; err.classList.remove('d-none'); }
});
</script>
</body></html>
